<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4efe7;
            --card: rgba(255, 255, 255, 0.9);
            --text: #1f2933;
            --accent: #b45309;
            --muted: #52606d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(180, 83, 9, 0.2), transparent 30%),
                linear-gradient(135deg, #f7f1e8 0%, #e7dccf 100%);
        }

        main {
            width: min(720px, calc(100% - 32px));
            padding: 48px 40px;
            border: 1px solid rgba(31, 41, 51, 0.08);
            border-radius: 24px;
            background: var(--card);
            box-shadow: 0 24px 60px rgba(31, 41, 51, 0.12);
        }

        h1 {
            margin: 0 0 16px;
            font-size: clamp(2.4rem, 6vw, 4rem);
            line-height: 1;
        }

        p {
            margin: 0 0 16px;
            font-size: 1.1rem;
            line-height: 1.7;
            color: var(--muted);
        }

        .pill {
            display: inline-block;
            margin-bottom: 18px;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(180, 83, 9, 0.12);
            color: var(--accent);
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        code {
            padding: 2px 6px;
            border-radius: 8px;
            background: rgba(31, 41, 51, 0.06);
        }
    </style>
</head>

<body>
    <main>
        <div class="pill">FastAPI</div>
        <h1>{{ title }}</h1>
        <p>{{ message }}</p>
        <p>Open <code>/docs</code> for Swagger UI or call <code>/api/health</code> for a health check.</p>
    </main>
</body>

</html>
